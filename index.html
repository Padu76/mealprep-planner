<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Prep Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="max-w-3xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-orange-500 mb-6">Meal Prep Planner</h1>

    <!-- ✅ Sezione form per creare la richiesta -->
    <div class="bg-white shadow-md rounded-lg p-6 mb-8">
      <h2 class="text-xl font-bold text-orange-500 mb-4">Crea la tua Richiesta</h2>
      <form id="requestForm" class="space-y-4">
        <div>
          <label class="block font-semibold">Età</label>
          <input type="number" name="age" class="w-full border rounded p-2" required/>
        </div>
        <div>
          <label class="block font-semibold">Peso (kg)</label>
          <input type="number" name="weight" class="w-full border rounded p-2" required/>
        </div>
        <div>
          <label class="block font-semibold">Altezza (cm)</label>
          <input type="number" name="height" class="w-full border rounded p-2" required/>
        </div>
        <div>
          <label class="block font-semibold">Pasti al Giorno (1-4)</label>
          <input type="number" name="mealsPerDay" min="1" max="4" class="w-full border rounded p-2" required/>
        </div>
        <div>
          <label class="block font-semibold">Giorni di Meal Prep (2,3,5,7)</label>
          <select name="prepDays" class="w-full border rounded p-2" required>
            <option value="">Seleziona</option>
            <option value="2">2 Giorni</option>
            <option value="3">3 Giorni</option>
            <option value="5">5 Giorni</option>
            <option value="7">7 Giorni</option>
          </select>
        </div>
        <div>
          <label class="block font-semibold">Tipo di Dieta</label>
          <input type="text" name="dietType" placeholder="Es: Bilanciata, Low-Carb..." class="w-full border rounded p-2" required/>
        </div>
        <div>
          <label class="block font-semibold">Esclusioni Alimentari</label>
          <input type="text" name="exclusions" placeholder="Es: noci, glutine..." class="w-full border rounded p-2"/>
        </div>
        <div>
          <label class="block font-semibold">Email</label>
          <input type="email" name="email" class="w-full border rounded p-2" required/>
        </div>
        <button type="submit" class="bg-orange-500 text-white py-2 px-4 rounded hover:bg-orange-600">Invia Richiesta</button>
      </form>
    </div>

    <!-- ✅ Dashboard con le richieste -->
    <div class="bg-white shadow-md rounded-lg p-6 mb-8">
      <h2 class="text-xl font-bold text-orange-500 mb-4">Dashboard Amministratore</h2>
      <table class="min-w-full text-sm">
        <thead>
          <tr class="bg-gray-200 text-left">
            <th class="py-2 px-4">ID Richiesta</th>
            <th class="py-2 px-4">Data Richiesta</th>
            <th class="py-2 px-4">Email</th>
            <th class="py-2 px-4">Stato</th>
          </tr>
        </thead>
        <tbody id="requestsTableBody"></tbody>
      </table>
    </div>

    <!-- ✅ Sezione dettagli + bottone generazione piano -->
    <div class="bg-white shadow-md rounded-lg p-6">
      <h2 class="text-xl font-bold text-orange-500 mb-4">Dettagli Richiesta</h2>
      <p class="mb-4 font-semibold">ID Richiesta: <span id="requestId">QUI-L-ID</span></p>
      <button id="generatePlanBtn" class="bg-orange-500 text-white py-2 px-4 rounded hover:bg-orange-600 mb-4">Genera Piano</button>
      <div id="mealPlanContainer" class="bg-gray-100 p-4 rounded"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="dettagli.js"></script>
</body>
</html>
