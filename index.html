<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Prep Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Sezione principale della landing (già presente) -->
  <header class="bg-white shadow">
    <div class="container mx-auto px-4 py-6">
      <h1 class="text-3xl font-bold text-orange-500">Meal Prep Planner</h1>
    </div>
  </header>

  <main class="container mx-auto px-4 py-16">
    <!-- Sezione esistente per i contenuti della landing -->
    <section class="mb-16">
      <h2 class="text-2xl font-bold mb-4">Benvenuto nel tuo Meal Prep Planner</h2>
      <p class="text-gray-700">Organizza i tuoi pasti in modo sano e facile!</p>
    </section>

    <!-- NUOVA SEZIONE: Dettagli richiesta -->
    <section id="request-details" class="container mx-auto px-4 max-w-2xl py-16 bg-white rounded-lg shadow-md">
      <h2 class="text-3xl font-bold text-center text-orange-500 mb-8">Dettagli Richiesta</h2>
      
      <!-- ID richiesta -->
      <p class="text-gray-700">ID Richiesta: <span id="requestId">QUI-L-ID</span></p>

      <!-- Bottone per generare il piano -->
      <button id="generatePlanBtn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-full transition duration-300 mt-4">
        Genera Piano
      </button>

      <!-- Container per mostrare il piano generato -->
      <div id="mealPlanContainer" class="bg-gray-50 border rounded-lg p-4 mt-6 text-sm whitespace-pre-wrap">
        <!-- Qui comparirà il piano generato -->
      </div>
    </section>
  </main>

  <footer class="bg-white shadow mt-16">
    <div class="container mx-auto px-4 py-6 text-center text-gray-500">
      &copy; 2025 Meal Prep Planner
    </div>
  </footer>

  <script src="dettagli.js"></script>
</body>
</html>
