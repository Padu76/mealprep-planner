<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Prep Planner</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #fff; color: #333; }
    header { background: #FF7F00; color: white; padding: 2rem; text-align: center; }
    section { padding: 2rem; max-width: 800px; margin: auto; }
    h1, h2 { color: #FF7F00; }
    input, select, textarea { width: 100%; padding: 0.7rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #4CAF50; color: white; padding: 1rem 2rem; border: none; border-radius: 5px; cursor: pointer; }
    .output { background: #f5f5f5; padding: 1rem; margin-top: 1rem; border-radius: 5px; }
  </style>
</head>
<body>
  <header>
    <h1>Meal Prep Planner Intelligente</h1>
    <p>Crea un piano di preparazione pasti pratico e su misura!</p>
  </header>

  <section>
    <h2>Compila il form</h2>
    <form id="plannerForm">
      <label>Durata (giorni):</label>
      <select id="duration" required>
        <option value="2">2 giorni</option>
        <option value="3">3 giorni</option>
        <option value="5">5 giorni</option>
        <option value="7">7 giorni</option>
      </select>

      <label>Obiettivo:</label>
      <select id="goal" required>
        <option value="Dimagrimento">Dimagrimento</option>
        <option value="Mantenimento">Mantenimento</option>
        <option value="Massa">Aumento massa</option>
      </select>

      <label>Età:</label>
      <input type="number" id="age" required/>

      <label>Peso (kg):</label>
      <input type="number" id="weight" required/>

      <label>Altezza (cm):</label>
      <input type="number" id="height" required/>

      <label>Dieta preferita:</label>
      <select id="diet" required>
        <option value="Bilanciata">Bilanciata</option>
        <option value="Low-carb">Low-carb</option>
        <option value="Low-fat">Low-fat</option>
      </select>

      <label>Cibi da escludere:</label>
      <textarea id="exclusions"></textarea>

      <label>Cibi già presenti in casa:</label>
      <textarea id="available"></textarea>

      <label>Numero pasti al giorno (1-4):</label>
      <select id="mealsPerDay" required>
        <option value="1">1 pasto</option>
        <option value="2">2 pasti</option>
        <option value="3">3 pasti</option>
        <option value="4">4 pasti</option>
      </select>

      <label>Numero di persone:</label>
      <input type="number" id="people" min="1" value="1" required/>

      <label>Email per ricevere il piano:</label>
      <input type="email" id="email" required/>

      <button type="button" onclick="generatePlan()">Crea il mio piano ora!</button>
    </form>

    <div class="output" id="planOutput"></div>
  </section>

  <script>
    function generatePlan() {
      const days = document.getElementById('duration').value;
      const goal = document.getElementById('goal').value;
      const age = document.getElementById('age').value;
      const weight = document.getElementById('weight').value;
      const height = document.getElementById('height').value;
      const diet = document.getElementById('diet').value;
      const exclusions = document.getElementById('exclusions').value;
      const available = document.getElementById('available').value;
      const mealsPerDay = document.getElementById('mealsPerDay').value;
      const people = document.getElementById('people').value;
      const email = document.getElementById('email').value;

      const calories = Math.round((10 * weight + 6.25 * height - 5 * age + 5) * (goal === "Massa" ? 1.3 : goal === "Dimagrimento" ? 0.8 : 1));
      const totalMeals = days * mealsPerDay * people;

      const output = `
        <h3>Il tuo piano meal-prep per ${people} persona/e:</h3>
        <p><strong>Obiettivo:</strong> ${goal} - ${calories} kcal/giorno</p>
        <p><strong>Pasti totali da preparare:</strong> ${totalMeals}</p>
        <p><strong>Dieta:</strong> ${diet}</p>
        <p><strong>Esclusioni:</strong> ${exclusions || 'Nessuna'}</p>
        <p><strong>Cibi disponibili:</strong> ${available || 'Nessuno'}</p>
        <h4>Step di preparazione:</h4>
        <ol>
          <li>Calcola quantità ingredienti totali in base a ${days} giorni, ${mealsPerDay} pasti/giorno e ${people} persona/e.</li>
          <li>Organizza cottura: cuoci carboidrati, proteine e verdure in un’unica sessione di meal-prep.</li>
          <li>Suddividi i pasti in contenitori etichettati per ogni giorno.</li>
        </ol>
        <p>Riceverai un PDF con la lista spesa e le istruzioni al tuo indirizzo: <strong>${email}</strong></p>
      `;
      document.getElementById('planOutput').innerHTML = output;
    }
  </script>
</body>
</html>
